// src/core/Emitter.ts
class Emitter {
  events = {};
  on(event, callback) {
    if (!this.events[event]) {
      this.events[event] = [];
    }
    this.events[event].push(callback);
  }
  once(event, callback) {
    const onceCallback = (data) => {
      callback(data);
      this.off(event, onceCallback);
    };
    this.on(event, onceCallback);
  }
  off(event, callback) {
    if (!this.events[event])
      return;
    if (callback) {
      const index = this.events[event].indexOf(callback);
      if (index > -1) {
        this.events[event].splice(index, 1);
      }
    } else {
      delete this.events[event];
    }
  }
  emit(event, data) {
    if (!this.events[event])
      return;
    const callbacks = [...this.events[event]];
    callbacks.forEach((callback) => {
      try {
        callback(data);
      } catch (error) {
        console.error(`Error in event listener for '${event}':`, error);
      }
    });
  }
  getEvents() {
    return Object.keys(this.events);
  }
  listenerCount(event) {
    return this.events[event]?.length || 0;
  }
  removeAllListeners() {
    this.events = {};
  }
  hasListeners(event) {
    return this.listenerCount(event) > 0;
  }
}
var emitter = new Emitter;

// src/utils/helpers.ts
function normalizeId(id) {
  if (id === null || id === undefined) {
    throw new Error("ID no puede ser null o undefined");
  }
  if (typeof id === "boolean")
    return String(id);
  if (typeof id === "symbol")
    return id.toString();
  if (typeof id === "bigint")
    return id.toString();
  if (id instanceof Date) {
    const time = id.getTime();
    return isNaN(time) ? String(id) : time;
  }
  if (typeof id === "string") {
    const trimmedId = id.trim();
    if (trimmedId === "")
      return trimmedId;
    if (/^0\d+$/.test(trimmedId))
      return trimmedId;
    const numValue = Number(trimmedId);
    if (!isNaN(numValue)) {
      return numValue > Number.MAX_SAFE_INTEGER ? trimmedId : numValue;
    }
    return trimmedId;
  }
  if (typeof id === "number") {
    return id > Number.MAX_SAFE_INTEGER ? String(id) : id;
  }
  return String(id);
}
function isValidId(id) {
  if (id === null || id === undefined) {
    return false;
  }
  if (typeof id === "string") {
    return id.trim() !== "";
  }
  if (typeof id === "number") {
    return Number.isFinite(id);
  }
  return false;
}
function findMissingIds(existingIds, start, end) {
  if (existingIds.length > 0 && typeof existingIds[0] === "object" && "id" in existingIds[0]) {
    const items = existingIds;
    const ids2 = items.map((item) => Number(item.id)).filter((id) => !isNaN(id)).sort((a, b) => a - b);
    const missingIds2 = [];
    let expectedId = 0;
    for (const id of ids2) {
      while (expectedId < id) {
        missingIds2.push(expectedId);
        expectedId++;
      }
      expectedId = id + 1;
    }
    return missingIds2;
  }
  const ids = existingIds;
  if (start === undefined || end === undefined) {
    return [];
  }
  const missingIds = [];
  if (typeof start === "number" && typeof end === "number") {
    const numericIds = ids.map((id) => Number(id)).filter((id) => !isNaN(id)).sort((a, b) => a - b);
    for (let i = start;i <= end; i++) {
      if (!numericIds.includes(i)) {
        missingIds.push(i);
      }
    }
  } else if (typeof start === "string" && typeof end === "string") {
    const startCode = start.charCodeAt(0);
    const endCode = end.charCodeAt(0);
    for (let i = startCode;i <= endCode; i++) {
      const char = String.fromCharCode(i);
      if (!ids.includes(char)) {
        missingIds.push(char);
      }
    }
  }
  return missingIds;
}
function generateNextId(allData) {
  if (allData.length > 0 && typeof allData[0] === "object" && "id" in allData[0]) {
    const items = allData;
    const numericIds2 = items.map((item) => Number(item.id)).filter((id) => !isNaN(id) && Number.isFinite(id)).sort((a, b) => a - b);
    if (numericIds2.length === 0)
      return 1;
    for (let i = 1;i <= numericIds2.length; i++) {
      if (!numericIds2.includes(i)) {
        return i;
      }
    }
    return Math.max(...numericIds2) + 1;
  }
  const ids = allData;
  if (ids.length === 0)
    return 1;
  const numericIds = ids.map((id) => Number(id)).filter((id) => !isNaN(id) && Number.isFinite(id));
  if (numericIds.length === ids.length) {
    const sortedIds = numericIds.sort((a, b) => a - b);
    return Math.max(...sortedIds) + 1;
  }
  if (ids.every((id) => typeof id === "string")) {
    return crypto.randomUUID();
  }
  return 1;
}
function downloadJSON(data, filename) {
  const dataStr = JSON.stringify(data, null, 2);
  const dataBlob = new Blob([dataStr], { type: "application/json" });
  const url = URL.createObjectURL(dataBlob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  link.click();
  URL.revokeObjectURL(url);
}
function readJSONFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader;
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        resolve(data);
      } catch (error) {
        reject(new Error("El archivo no es un JSON válido"));
      }
    };
    reader.onerror = () => reject(new Error("Error al leer el archivo"));
    reader.readAsText(file);
  });
}
function validateDatabaseConfig(config) {
  return config && typeof config === "object" && typeof config.name === "string" && config.name.trim() !== "" && typeof config.version === "number" && config.version > 0 && typeof config.store === "string" && config.store.trim() !== "";
}
function validateStoreSchema(storeConfig) {
  if (!storeConfig || typeof storeConfig !== "object") {
    return false;
  }
  if (typeof storeConfig.name !== "string" || storeConfig.name.trim() === "") {
    return false;
  }
  if (storeConfig.keyPath !== undefined && typeof storeConfig.keyPath !== "string") {
    return false;
  }
  if (storeConfig.autoIncrement !== undefined && typeof storeConfig.autoIncrement !== "boolean") {
    return false;
  }
  if (storeConfig.indexes !== undefined) {
    if (!Array.isArray(storeConfig.indexes)) {
      return false;
    }
    return storeConfig.indexes.every((index) => validateDatabaseIndex(index));
  }
  return true;
}
function validateDatabaseSchema(schema) {
  if (!schema || typeof schema !== "object") {
    return false;
  }
  if (typeof schema.name !== "string" || schema.name.trim() === "") {
    return false;
  }
  if (typeof schema.version !== "number" || schema.version <= 0) {
    return false;
  }
  if (!Array.isArray(schema.stores) || schema.stores.length === 0) {
    return false;
  }
  return schema.stores.every((store) => validateStoreSchema(store));
}
function validateDatabaseIndex(index) {
  if (!index || typeof index !== "object") {
    return false;
  }
  if (typeof index.name !== "string" || index.name.trim() === "") {
    return false;
  }
  if (typeof index.keyPath !== "string" || index.keyPath.trim() === "") {
    return false;
  }
  if (index.unique !== undefined && typeof index.unique !== "boolean") {
    return false;
  }
  return true;
}
function validateAnyDatabaseConfig(config) {
  if (!config || typeof config !== "object") {
    return false;
  }
  if ("stores" in config) {
    return validateDatabaseSchema(config);
  }
  if ("defaultDatabase" in config) {
    return validateDatabaseConfig(config.defaultDatabase);
  }
  return validateDatabaseConfig(config);
}
function createTimestamp(date) {
  const targetDate = date || new Date;
  return targetDate.toISOString();
}
function debounce(func, wait) {
  let timeout = null;
  return (...args) => {
    if (timeout) {
      clearTimeout(timeout);
    }
    timeout = setTimeout(() => {
      func(...args);
    }, wait);
  };
}
function throttle(func, limit) {
  let inThrottle = false;
  return (...args) => {
    if (!inThrottle) {
      func(...args);
      inThrottle = true;
      setTimeout(() => inThrottle = false, limit);
    }
  };
}
function convertToCSV(data) {
  if (data.length === 0) {
    return "";
  }
  const firstItemHeaders = data[0] && typeof data[0] === "object" ? Object.keys(data[0]) : [];
  const allHeaders = new Set;
  data.forEach((item) => {
    if (item && typeof item === "object") {
      Object.keys(item).forEach((key) => allHeaders.add(key));
    }
  });
  const remainingHeaders = Array.from(allHeaders).filter((h) => !firstItemHeaders.includes(h)).sort();
  const headers = [...firstItemHeaders, ...remainingHeaders];
  const csvHeaders = headers.join(",");
  const csvRows = data.map((item) => {
    return headers.map((header) => {
      const value = item?.[header] ?? "";
      if (typeof value === "string" && (value.includes(",") || value.includes('"'))) {
        return `"${value.replace(/"/g, '""')}"`;
      }
      return value;
    }).join(",");
  });
  return [csvHeaders, ...csvRows].join(`
`);
}

// src/adapters/browser.ts
class BrowserAdapter {
  async openDatabase(name, version) {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(name, version);
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
      request.onupgradeneeded = () => {};
    });
  }
  transaction(storeName, mode) {
    return { storeName, mode };
  }
  createObjectStore(db, name, options) {
    if (db.objectStoreNames.contains(name)) {
      const transaction = db.transaction([name], "readwrite");
      return transaction.objectStore(name);
    }
    return db.createObjectStore(name, options);
  }
  _executeRequest(db, storeName, mode, operation) {
    return new Promise((resolve, reject) => {
      try {
        const transaction = db.transaction([storeName], mode);
        const store = transaction.objectStore(storeName);
        const request = operation(store);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      } catch (error) {
        reject(error);
      }
    });
  }
  async get(storeInfo, key) {
    const { db, storeName } = storeInfo;
    return this._executeRequest(db, storeName, "readonly", (store) => store.get(key));
  }
  async put(storeInfo, value) {
    const { db, storeName } = storeInfo;
    return this._executeRequest(db, storeName, "readwrite", (store) => store.put(value));
  }
  async delete(storeInfo, key) {
    const { db, storeName } = storeInfo;
    return this._executeRequest(db, storeName, "readwrite", (store) => store.delete(key));
  }
  async getAll(storeInfo) {
    const { db, storeName } = storeInfo;
    return this._executeRequest(db, storeName, "readonly", (store) => store.getAll());
  }
  async clear(storeInfo) {
    const { db, storeName } = storeInfo;
    return this._executeRequest(db, storeName, "readwrite", (store) => store.clear());
  }
  async count(storeInfo) {
    const { db, storeName } = storeInfo;
    return this._executeRequest(db, storeName, "readonly", (store) => store.count());
  }
  close(db) {
    db.close();
  }
  async deleteDatabase(name) {
    return new Promise((resolve, reject) => {
      const request = indexedDB.deleteDatabase(name);
      request.onsuccess = () => resolve();
      request.onerror = () => reject(request.error);
      request.onblocked = () => {
        console.warn(`Deletion of database ${name} is blocked.`);
        resolve();
      };
    });
  }
  async clearAll() {
    console.warn("clearAll is not implemented for BrowserAdapter due to IndexedDB limitations.");
    if (indexedDB.databases) {
      const dbs = await indexedDB.databases();
      for (const dbInfo of dbs) {
        if (dbInfo.name) {
          await this.deleteDatabase(dbInfo.name);
        }
      }
    } else {
      console.warn("indexedDB.databases() is not supported in this browser. Cannot clear all databases automatically.");
    }
  }
}

// src/core/IndexedDBManager.ts
class SchemaManager {
  schemas = new Map;
  activeSchema = null;
  setSchema(schema) {
    this.schemas.set(schema.name, schema);
    this.activeSchema = schema;
  }
  getSchema(name) {
    if (name) {
      return this.schemas.get(name) || null;
    }
    return this.activeSchema;
  }
  getStoreConfig(schemaName, storeName) {
    const schema = this.schemas.get(schemaName);
    return schema?.stores.find((store) => store.name === storeName);
  }
  validateStore(schemaName, storeName) {
    const schema = this.schemas.get(schemaName);
    return schema?.stores.some((store) => store.name === storeName) || false;
  }
}

class StoreProxy {
  _manager;
  _storeName;
  _instanceId;
  constructor(manager, storeName) {
    this._manager = manager;
    this._storeName = storeName;
    this._instanceId = `${storeName}-${Date.now()}-${Math.random()}`;
  }
  get storeName() {
    return this._storeName;
  }
  get instanceId() {
    return this._instanceId;
  }
  async add(data) {
    return this._manager.saveDataToStore(this._storeName, data);
  }
  async get(id) {
    return this._manager.getDataByIdFromStore(this._storeName, id);
  }
  async update(item) {
    return this._manager.updateDataByIdInStore(this._storeName, item.id, item);
  }
  async delete(id) {
    try {
      await this._manager.deleteDataFromStore(this._storeName, id);
      return true;
    } catch {
      return false;
    }
  }
  async getAll() {
    return this._manager.getAllDataFromStore(this._storeName);
  }
  async clear() {
    return this._manager.clearStore(this._storeName);
  }
  async count() {
    return this._manager.countInStore(this._storeName);
  }
  async search(query, options = {}) {
    return this._manager.searchDataInStore(this._storeName, query, options);
  }
  async filter(criteria) {
    return this._manager.filterInStore(this._storeName, criteria);
  }
  async addMany(items) {
    return this._manager.addManyToStore(this._storeName, items);
  }
  async updateMany(items) {
    return this._manager.updateManyInStore(this._storeName, items);
  }
  async deleteMany(ids) {
    return this._manager.deleteManyFromStore(this._storeName, ids);
  }
  async getMany(ids) {
    return this._manager.getManyFromStore(this._storeName, ids);
  }
  async getStats() {
    return this._manager.getStatsForStore(this._storeName);
  }
}

class IndexedDBManager {
  dbConfig;
  schemaManager = new SchemaManager;
  emitterInstance;
  db;
  defaultIndexes;
  storeProxies = new Map;
  adapter;
  isNodeEnvironment;
  constructor(dbConfig, options) {
    this.isNodeEnvironment = typeof window === "undefined";
    this.adapter = options?.adapter || new BrowserAdapter;
    if ("stores" in dbConfig) {
      this.schemaManager.setSchema(dbConfig);
      this.dbConfig = {
        name: dbConfig.name,
        version: dbConfig.version,
        store: dbConfig.stores[0]?.name || "default"
      };
    } else {
      const actualConfig = "defaultDatabase" in dbConfig ? dbConfig.defaultDatabase : dbConfig;
      if (!validateAnyDatabaseConfig(actualConfig)) {
        throw new Error("Invalid database configuration provided");
      }
      this.dbConfig = actualConfig;
    }
    this.emitterInstance = emitter;
    this.db = null;
    this.defaultIndexes = [];
    if (options?.autoInit) {
      this.openDatabase().catch((error) => {
        this.emitterInstance.emit("error", error);
      });
    }
  }
  setAdapter(adapter) {
    this.adapter = adapter;
    this.isNodeEnvironment = !(adapter instanceof BrowserAdapter);
  }
  static async initializeWithSchema(schema, options) {
    const manager = new IndexedDBManager(schema, { ...options, autoInit: false });
    await manager.openDatabase();
    return manager;
  }
  async registerSchema(schema) {
    this.schemaManager.setSchema(schema);
    if (schema.name === this.dbConfig.name) {
      this.close();
      this.dbConfig = {
        name: schema.name,
        version: schema.version,
        store: schema.stores[0]?.name || "default"
      };
      await this.openDatabase();
    }
  }
  store(storeName) {
    const currentSchema = this.schemaManager.getSchema();
    if (currentSchema && !this.schemaManager.validateStore(currentSchema.name, storeName)) {
      throw new Error(`Store '${storeName}' not found in schema '${currentSchema.name}'`);
    }
    const proxyKey = `${storeName}-${Date.now()}`;
    const proxy = new StoreProxy(this, storeName);
    this.storeProxies.set(proxyKey, proxy);
    this.cleanupOldProxies(storeName);
    return proxy;
  }
  cleanupOldProxies(storeName) {
    const storeProxies = Array.from(this.storeProxies.entries()).filter(([key]) => key.startsWith(storeName)).sort(([a], [b]) => b.localeCompare(a));
    if (storeProxies.length > 10) {
      const toDelete = storeProxies.slice(10);
      toDelete.forEach(([key]) => this.storeProxies.delete(key));
    }
  }
  getSchemaInfo() {
    return {
      current: this.schemaManager.getSchema(),
      registered: Array.from(this.schemaManager["schemas"].keys())
    };
  }
  setSchema(schema) {
    this.schemaManager.setSchema(schema);
    this.dbConfig = {
      name: schema.name,
      version: schema.version,
      store: schema.stores[0]?.name || "default"
    };
  }
  setEmitterInstance(emitterInstance) {
    this.emitterInstance = emitterInstance;
  }
  refreshEmitterInstance() {
    this.emitterInstance = emitter;
  }
  setDefaultIndexes(indexes) {
    this.defaultIndexes = indexes;
  }
  async setDatabase(config) {
    if (!validateAnyDatabaseConfig(config)) {

                    showStatus('Por favor completa ID y datos', 'error');
                    return;
                }
                
                const data = JSON.parse(dataStr);
                data.id = id;
                
                await dbManager.update(data);
                addOutput('crudOutput', `Actualizado: ${JSON.stringify(data)}`);
                showStatus('Item actualizado correctamente');
                
            } catch (error) {
                addOutput('crudOutput', `Error: ${error.message}`);
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        // Eliminar item
        async function deleteItem() {
            if (!dbManager) {
                showStatus('Primero inicializa la base de datos', 'error');
                return;
            }
            
            try {
                const id = document.getElementById('itemId').value;
                
                if (!id) {
                    showStatus('Por favor ingresa un ID', 'error');
                    return;
                }
                
                await dbManager.delete(id);
                addOutput('crudOutput', `Eliminado: ${id}`);
                showStatus('Item eliminado correctamente');
                
            } catch (error) {
                addOutput('crudOutput', `Error: ${error.message}`);
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        // Agregar datos de prueba en lote
        async function addData() {
            if (!dbManager) {
                showStatus('Primero inicializa la base de datos', 'error');
                return;
            }
            
            try {
                const testData = [
                    { id: 'user1', name: 'Juan Pérez', email: 'juan@email.com', age: 30 },
                    { id: 'user2', name: 'María García', email: 'maria@email.com', age: 25 },
                    { id: 'user3', name: 'Carlos López', email: 'carlos@email.com', age: 35 },
                    { id: 'user4', name: 'Ana Martínez', email: 'ana@email.com', age: 28 },
                    { id: 'user5', name: 'Luis Rodríguez', email: 'luis@email.com', age: 32 }
                ];
                
                await dbManager.add(testData);
                addOutput('batchOutput', `Agregados ${testData.length} items en lote`);
                showStatus('Datos de prueba agregados correctamente');
                
            } catch (error) {
                addOutput('batchOutput', `Error: ${error.message}`);
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        // Obtener todos los items
        async function getAllItems() {
            if (!dbManager) {
                showStatus('Primero inicializa la base de datos', 'error');
                return;
            }
            
            try {
                const items = await dbManager.getAll();
                addOutput('batchOutput', `Total de items: ${items.length}`);
                addOutput('batchOutput', JSON.stringify(items, null, 2));
                
            } catch (error) {
                addOutput('batchOutput', `Error: ${error.message}`);
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        // Buscar items
        async function searchItems() {
            if (!dbManager) {
                showStatus('Primero inicializa la base de datos', 'error');
                return;
            }
            
            try {
                const searchTerm = document.getElementById('searchTerm').value;
                
                if (!searchTerm) {
                    showStatus('Por favor ingresa un término de búsqueda', 'error');
                    return;
                }
                
                const results = await dbManager.search('name', searchTerm);
                addOutput('batchOutput', `Resultados de búsqueda para '${searchTerm}': ${results.length} items`);
                addOutput('batchOutput', JSON.stringify(results, null, 2));
                
            } catch (error) {
                addOutput('batchOutput', `Error: ${error.message}`);
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        // Exportar datos
        async function exportData() {
            if (!dbManager) {
                showStatus('Primero inicializa la base de datos', 'error');
                return;
            }
            
            try {
                const exportedData = await dbManager.exportData();
                addOutput('importExportOutput', `Datos exportados: ${JSON.stringify(exportedData, null, 2)}`);
                showStatus('Datos exportados correctamente');
                
            } catch (error) {
                addOutput('importExportOutput', `Error: ${error.message}`);
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        // Descargar backup
        async function downloadBackup() {
            if (!dbManager) {
                showStatus('Primero inicializa la base de datos', 'error');
                return;
            }
            
            try {
                await dbManager.getAll();
                addOutput('importExportOutput', 'Backup descargado');
                showStatus('Backup descargado correctamente');
                
            } catch (error) {
                addOutput('importExportOutput', `Error: ${error.message}`);
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        // Importar datos
        async function importData() {
            if (!dbManager) {
                showStatus('Primero inicializa la base de datos', 'error');
                return;
            }
            
            try {
                const fileInput = document.getElementById('importFile');
                const file = fileInput.files[0];
                
                if (!file) {
                    return;
                }
                
                await dbManager.importData(file);
                addOutput('importExportOutput', `Datos importados desde: ${file.name}`);
                showStatus('Datos importados correctamente');
                
            } catch (error) {
                addOutput('importExportOutput', `Error: ${error.message}`);
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        // Obtener estadísticas
        async function getStats() {
            if (!dbManager) {
                showStatus('Primero inicializa la base de datos', 'error');
                return;
            }
            
            try {
                const stats = await dbManager.getStats();
                addOutput('eventsOutput', `Estadísticas: ${JSON.stringify(stats, null, 2)}`);
                
            } catch (error) {
                addOutput('eventsOutput', `Error: ${error.message}`);
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        // Limpiar eventos
        function clearEvents() {
            document.getElementById('eventsOutput').innerHTML = '';
        }
        
        // Inicializar automáticamente al cargar la página
        window.addEventListener('load', () => {
            addOutput('eventsOutput', '🚀 Demo cargado. Haz clic en "Inicializar DB" para comenzar.');
        });
    </script>
</body>
</html>
